<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>StreamAlerts — Overlay OBS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/alerts.css">
  <link rel="stylesheet" href="styles/chat.css">
  <link rel="stylesheet" href="styles/last-events.css">
  <link rel="stylesheet" href="styles/goals.css">
  <link rel="stylesheet" href="styles/subtrain.css">
  <link rel="stylesheet" href="styles/nowplaying.css">
  <link rel="stylesheet" href="styles/queue.css">
  <link rel="stylesheet" href="styles/viewers.css">
  <link rel="stylesheet" href="styles/uptime.css">
  <link rel="stylesheet" href="styles/session.css">
  <link rel="stylesheet" href="styles/countdown.css">
  <link rel="stylesheet" href="styles/leaderboard.css">
  <link rel="stylesheet" href="styles/poll.css">
  <link rel="stylesheet" href="styles/prediction.css">
  <link rel="stylesheet" href="styles/hypetrain.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════
       ZONE : Alertes Twitch
       Données : data/alert.json
  ════════════════════════════════════════════════════ -->
  <div id="zone-alerts">
    <div id="alert-container"></div>
  </div>

  <!-- ═══════════════════════════════════════════════════
       ZONE : Chat overlay
       Données : data/chat.json (fallback WebSocket)
  ════════════════════════════════════════════════════ -->
  <div id="zone-chat"></div>

  <!-- ═══════════════════════════════════════════════════
       ZONE : Dernier follow
       Données : data/last_follower.json
  ════════════════════════════════════════════════════ -->
  <div id="zone-last-follower"></div>

  <!-- ═══════════════════════════════════════════════════
       ZONE : Dernier sub
       Données : data/last_subscriber.json
  ════════════════════════════════════════════════════ -->
  <div id="zone-last-subscriber"></div>

  <!-- ═══════════════════════════════════════════════════
       ZONE : Objectif / Goal tracker
       Données : data/goal.json
  ════════════════════════════════════════════════════ -->
  <div id="zone-goal"></div>

  <!-- ═══════════════════════════════════════════════════
       ZONE : Sub Train
       Données : data/subtrain.json
  ════════════════════════════════════════════════════ -->
  <div id="zone-subtrain"></div>

  <!-- ═══════════════════════════════════════════════════
       ZONE : Musique en cours
       Données : data/nowplaying.json
  ════════════════════════════════════════════════════ -->
  <div id="zone-nowplaying"></div>

  <!-- ═══════════════════════════════════════════════════
       ZONE : Queue viewers
       Données : data/queue.json
  ════════════════════════════════════════════════════ -->
  <div id="zone-queue"></div>

  <!-- ═══════════════════════════════════════════════════
       ZONE : Spectateurs en direct
       Données : data/viewers.json
  ════════════════════════════════════════════════════ -->
  <div id="zone-viewers"></div>

  <!-- ═══════════════════════════════════════════════════
       ZONE : Uptime / Durée du stream
       Données : data/uptime.json
  ════════════════════════════════════════════════════ -->
  <div id="zone-uptime"></div>

  <!-- ═══════════════════════════════════════════════════
       ZONE : Statistiques de session
       Données : data/session.json
  ════════════════════════════════════════════════════ -->
  <div id="zone-session"></div>

  <!-- ═══════════════════════════════════════════════════
       ZONE : Compte à rebours
       Données : data/countdown.json
  ════════════════════════════════════════════════════ -->
  <div id="zone-countdown"></div>

  <!-- ═══════════════════════════════════════════════════
       ZONE : Classement / Leaderboard
       Données : data/leaderboard.json
  ════════════════════════════════════════════════════ -->
  <div id="zone-leaderboard"></div>

  <!-- ═══════════════════════════════════════════════════
       ZONE : Sondage Twitch (Poll)
       Données : data/poll.json
  ════════════════════════════════════════════════════ -->
  <div id="zone-poll"></div>

  <!-- ═══════════════════════════════════════════════════
       ZONE : Prédiction Twitch
       Données : data/prediction.json
  ════════════════════════════════════════════════════ -->
  <div id="zone-prediction"></div>

  <!-- ═══════════════════════════════════════════════════
       ZONE : Hype Train (temps réel)
       Données : data/hypetrain.json
  ════════════════════════════════════════════════════ -->
  <div id="zone-hypetrain"></div>

  <!-- Barre de raccourcis (generée par Keyboard.updateHint) -->
  <div id="test-hint"></div>

  <!-- ══════════════════════════════════════════════════════
       SCRIPTS — ordre de chargement obligatoire :
         1. core/      fondations (Log, Bus, Config, Store, BaseComponent)
         2. utils/     fonctions pures (esc, formatCountdown, color)
         3. services/  I/O partagée (Poller, WS, Visibility)
         4. dev/       outils de debug (chargés toujours, actifs si ?debug=1)
         5. components/  logique métier + rendu
         6. script.js  bootstrap final
  ════════════════════════════════════════════════════════ -->

  <!-- 1. CORE -->
  <script src="core/logger.js"></script>
  <script src="core/event-bus.js"></script>
  <script src="core/config-manager.js"></script>
  <script src="core/state-store.js"></script>
  <script src="core/base-component.js"></script>

  <!-- 2. UTILS -->
  <script src="utils/dom.js"></script>
  <script src="utils/time.js"></script>
  <script src="utils/color.js"></script>

  <!-- 3. SERVICES -->
  <script src="services/polling-manager.js"></script>
  <script src="services/websocket-manager.js"></script>
  <script src="services/visibility-manager.js"></script>
  <script src="services/scene-manager.js"></script>

  <!-- 4. DEV (actif uniquement si ?debug=1 dans l'URL) -->
  <script src="dev/keyboard-tester.js"></script>
  <script src="dev/debug-panel.js"></script>

  <!-- 5. COMPONENTS -->
  <script src="components/alerts.js"></script>
  <script src="components/chat.js"></script>
  <script src="components/last-follower.js"></script>
  <script src="components/last-subscriber.js"></script>
  <script src="components/goals.js"></script>
  <script src="components/subtrain.js"></script>
  <script src="components/nowplaying.js"></script>
  <script src="components/queue.js"></script>
  <script src="components/viewers.js"></script>
  <script src="components/uptime.js"></script>
  <script src="components/session.js"></script>
  <script src="components/countdown.js"></script>
  <script src="components/leaderboard.js"></script>
  <script src="components/poll.js"></script>
  <script src="components/prediction.js"></script>
  <script src="components/hypetrain.js"></script>

  <!-- 6. BOOTSTRAP -->
  <script src="script.js"></script>

</body>
</html>
