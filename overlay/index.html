<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>StreamAlerts — Overlay OBS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════
       ZONE : Alertes Twitch — bas centre
       Données : data/alert.json
  ════════════════════════════════════════════════════ -->
  <div id="zone-alerts">
    <div id="alert-container"></div>
  </div>

  <!-- ═══════════════════════════════════════════════════
       ZONE : Chat overlay — droite
       Données : data/chat.json
  ════════════════════════════════════════════════════ -->
  <div id="zone-chat"></div>

  <!-- ═══════════════════════════════════════════════════
       ZONE : Dernier follow — bas gauche
       Données : data/last_follower.json
  ════════════════════════════════════════════════════ -->
  <div id="zone-last-follower"></div>

  <!-- ═══════════════════════════════════════════════════
       ZONE : Dernier sub — bas gauche (au-dessus du follow)
       Données : data/last_subscriber.json
  ════════════════════════════════════════════════════ -->
  <div id="zone-last-subscriber"></div>

  <!-- ═══════════════════════════════════════════════════
       ZONE : Objectif / Goal tracker — haut centre
       Données : data/goal.json
  ════════════════════════════════════════════════════ -->
  <div id="zone-goal"></div>

  <!-- ═══════════════════════════════════════════════════
       ZONE : Sub Train — haut droite
       Données : data/subtrain.json
  ════════════════════════════════════════════════════ -->
  <div id="zone-subtrain"></div>

  <!-- ═══════════════════════════════════════════════════
       ZONE : Musique en cours — bas gauche
       Données : data/nowplaying.json
  ════════════════════════════════════════════════════ -->
  <div id="zone-nowplaying"></div>

  <!-- ═══════════════════════════════════════════════════
       ZONE : Queue viewers — haut gauche
       Données : data/queue.json
  ════════════════════════════════════════════════════ -->
  <div id="zone-queue"></div>

  <!-- ═══════════════════════════════════════════════════
       ZONE : Compteur d'événements — futur
       Données : data/counter.json
  ════════════════════════════════════════════════════ -->
  <!-- <div id="zone-counter"></div> -->

  <!-- Indicateur de test (non visible dans OBS) -->
  <div id="test-hint"><kbd>T</kbd> alertes &nbsp;·&nbsp; <kbd>C</kbd> chat &nbsp;·&nbsp; <kbd>L</kbd> last &nbsp;·&nbsp; <kbd>G</kbd> goal &nbsp;·&nbsp; <kbd>S</kbd> train &nbsp;·&nbsp; <kbd>N</kbd> music &nbsp;·&nbsp; <kbd>U</kbd> queue</div>

  <!-- ── Composants actifs ── -->
  <script src="components/alerts.js"></script>
  <script src="components/chat.js"></script>
  <script src="components/lastevents.js"></script>
  <script src="components/goals.js"></script>
  <script src="components/subtrain.js"></script>
  <script src="components/nowplaying.js"></script>
  <script src="components/queue.js"></script>

  <!-- Point d'entrée — initialise tous les composants -->
  <script src="script.js"></script>

</body>
</html>
